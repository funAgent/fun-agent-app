name: AIbubu
slug: ai-bubu
tagline:
  zh: AI 时代的编码计步器
  en: A coding step counter for the AI era
description:
  zh: 桌面宠物应用，监控你使用 AI 编码工具（Cursor、Claude Code、Codex、Trae）的活跃度，将其量化为步数，驱动桌面宠物行走 — 编码越多，宠物跑得越快。
  en: A desktop pet app that monitors your usage of AI coding tools (Cursor, Claude Code, Codex, Trae), quantifies your coding activity into steps, and drives a desktop pet — the more you code, the faster your pet runs.
category: tool
status: released
website: https://aibubu.app
