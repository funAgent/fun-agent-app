highlights:
  zh:
    - 支持 Cursor、Claude Code、Codex CLI、Trae 等 AI 工具监控
    - 8 款内置像素皮肤，支持自定义导入
    - 局域网社交 — 自动发现队友宠物，查看排行榜
    - 中英双语 UI，开机自启
  en:
    - Monitors Cursor, Claude Code, Codex CLI, Trae and more
    - 8 built-in pixel skins with custom import support
    - LAN social — auto-discover teammates' pets and leaderboard
    - Bilingual UI with auto-start support
